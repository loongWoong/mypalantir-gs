    source_type: EntryTransaction
    target_type: Vehicle
    cardinality: many-to-one
    direction: directed
    data_source:
      connection_id: local_h2
      table: TBL_ENTRYWASTE
      source_id_column: VLP
      target_id_column: PLATE_NUM
      link_mode: foreign_key
      field_mapping: {}

  # 入口交易使用介质
  - name: entry_uses_media
