  - name: Path
    display_name: 车辆通行路径
    description: "车辆通行路径"
    url: "http://192.168.67.130:8081/view/2016786205915873281"
    properties:
      - name: pass_id
        display_name: 通行标识
        data_type: string
        required: false
        description: "通行标识"
      
      - name: plate_num
        display_name: 车牌号码
        data_type: string
        required: false
        description: "车牌号码"
      
