      - name: ex_time
        display_name: 出口时间
        data_type: date
        required: false
        description: "出口时间"
      
      - name: en_toll_lane_id
        display_name: 入口车道编号
        data_type: string
        required: false
        description: "入口车道编号"
      
      - name: ex_toll_lane_id
        display_name: 出口车道编号
        data_type: string
        required: false
        description: "出口车道编号"
      
      - name: en_toll_station_id
        display_name: 入口收费站编号
        data_type: string
        required: false
        description: "入口收费站编号"
      
      - name: ex_toll_station_id
        display_name: 出口收费站编号
        data_type: string
        required: false
        description: "出口收费站编号"
      
      - name: ex_vehicle_type
        display_name: 出口车辆类型
        data_type: integer
        required: false
        description: "出口车辆类型"
      
      - name: pay_type
        display_name: 支付类型
        data_type: integer
        required: false
        description: "支付类型"
      
      - name: pay_card_type
        display_name: 支付卡类型
        data_type: integer
        required: false
        description: "支付卡类型"
      
      - name: l_date
        display_name: 逻辑日期
        data_type: date
        required: false
        description: "逻辑日期"
      # ---- 衍生属性（derived properties，由 CEL 表达式计算） ----
      # 设计原则：
      #   - 衍生属性只保留用户需要看到的业务指标（数据）
      #   - 复杂判断逻辑（算法）抽为 functions，由规则直接调用
      #   - SWRL 规则负责组合命题进行推理

      # -- 基础统计指标 --
      - name: path_detail_count
        display_name: 路径明细数量
        data_type: int
        derived: true
        expr: "size(links.path_has_path_details)"
        description: "该通行路径关联的路径明细记录数"

      - name: split_detail_count
        display_name: 拆分明细数量
        data_type: int
        derived: true
        expr: "size(links.path_has_split_details)"
        description: "该通行路径关联的拆分明细记录数"

      - name: gantry_transaction_count
        display_name: 门架交易数量
        data_type: int
        derived: true
        expr: "size(links.Path_has_gantry_transactions)"
        description: "该通行路径关联的门架交易记录数"

      # -- 费用汇总指标 --
      - name: path_fee_total
        display_name: 路径明细费用合计
        data_type: float
        derived: true
        expr: >
          links.path_has_path_details
            .map(d, double(d.fee)).sum()
        description: "路径明细中各收费单元费用的合计"

      - name: split_fee_total
        display_name: 拆分明细费用合计
        data_type: float
        derived: true
        expr: >
          links.path_has_split_details
            .map(s, s.toll_interval_fee).sum()
        description: "拆分明细中各区间通行费的合计"

      - name: gantry_fee_total
        display_name: 门架交易费用合计
        data_type: float
        derived: true
        expr: >
          links.Path_has_gantry_transactions
            .map(g, double(g.fee)).sum()
        description: "门架交易中各笔交易金额的合计"

      - name: gantry_pay_fee_total
        display_name: 门架应收金额合计
        data_type: float
        derived: true
        expr: >
          links.Path_has_gantry_transactions
            .map(g, double(g.pay_fee)).sum()
        description: "门架交易中各笔应收金额的合计"

      # -- 简单等值判断（多规则共用，作为缓存保留） --
      - name: detail_count_matched
        display_name: 明细数量是否一致
        data_type: boolean
        derived: true
        expr: >
          size(links.path_has_path_details)
          == size(links.path_has_split_details)
        description: "路径明细数量与拆分明细数量是否一致"

      - name: interval_set_matched
        display_name: 收费单元是否对应
        data_type: boolean
        derived: true
        expr: >
          links.path_has_path_details
            .map(d, d.identify_point_id).sort()
          == links.path_has_split_details
            .map(s, s.interval_id).sort()
        description: "路径明细的标识点与拆分明细的收费单元是否一一对应"

      - name: fee_matched
        display_name: 费用是否一致
        data_type: boolean
        derived: true
        expr: >
          links.path_has_path_details
            .map(d, double(d.fee)).sum()
          == links.path_has_split_details
            .map(s, s.toll_interval_fee).sum()
        description: "路径明细费用合计与拆分明细通行费合计是否一致"
