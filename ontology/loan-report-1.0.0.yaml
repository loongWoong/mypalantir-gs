version: 1.0.0
namespace: ontology.gs
data_sources: []
object_types:
  - name: loan
    display_name: 债项
    description: 每笔贷款在系统中的唯一标识
    base_type: null
    properties:
      - name: loanId
        data_type: string
        required: true
        display_name: 债项编号
        description: 每笔贷款在系统中的唯一标识编号
        default_value: null
        constraints:
          unique: true
      - name: statDate
        data_type: string
        required: false
        display_name: 报表期次
        description: 报表所对应的统计日期，如年月日等
        default_value: null
        constraints: null
      - name: bsType
        data_type: string
        required: false
        display_name: 业务分类
        description: 贷款业务的分类维度，例如：流动资金贷款、固定资产贷款等
        default_value: null
        constraints: null
      - name: loanPrinBalRmb
        data_type: double
        required: false
        display_name: 贷款余额-人民币
        description: 当前贷款未偿还本金余额，以人民币表示
        default_value: null
        constraints: null
      - name: loanPrinBal
        data_type: double
        required: false
        display_name: 贷款余额-原币
        description: 当前贷款未偿还本金余额，以原始币种表示
        default_value: null
        constraints: null
      - name: loanPrinBalAcc
        data_type: double
        required: false
        display_name: 贷款余额-记账币
        description: 当前贷款未偿还本金余额，以记账币种表示
        default_value: null
        constraints: null
      - name: loanPrinBalUsd
        data_type: double
        required: false
        display_name: 贷款余额-美元
        description: 当前贷款未偿还本金余额，以美元表示
        default_value: null
        constraints: null
      - name: intBal
        data_type: double
        required: false
        display_name: 应收利息-人民币
        description: 当前应收取但尚未收到的利息金额，以人民币计
        default_value: null
        constraints: null
      - name: effDate
        data_type: string
        required: false
        display_name: 起息日
        description: 贷款开始计算利息的日期
        default_value: null
        constraints: null
      - name: expDate
        data_type: string
        required: false
        display_name: 到期日
        description: 贷款合同规定的到期还款日期
        default_value: null
        constraints: null
      - name: riskType
        data_type: string
        required: false
        display_name: 五级分类-调整前
        description: 贷款按照五级分类标准划分的等级（调整前）
        default_value: null
        constraints: null
      - name: riskTypeSup
        data_type: string
        required: false
        display_name: 五级分类-监管调整后
        description: 监管要求下调整后的五级分类结果
        default_value: null
        constraints: null
      - name: riskTypeAdt
        data_type: string
        required: false
        display_name: 五级分类-审计调整后
        description: 审计过程中调整后的五级分类结果
        default_value: null
        constraints: null
      - name: riskTypeCode
        data_type: string
        required: false
        display_name: 十三级分类
        description: 更细致的贷款风险分类体系，共十三个级别
        default_value: null
        constraints: null
      - name: ovdeFlag
        data_type: string
        required: false
        display_name: 逾期标识
        description: 标识该笔贷款是否处于逾期状态
        default_value: null
        constraints: null
      - name: ovdePrin
        data_type: double
        required: false
        display_name: 逾期金额-人民币
        description: 贷款已逾期部分的本金金额，以人民币计
        default_value: null
        constraints: null
      - name: ovduDays
        data_type: int
        required: false
        display_name: 逾期天数
        description: 自贷款到期日至当前的实际逾期天数
        default_value: null
        constraints: null
      - name: regroupFlag
        data_type: string
        required: false
        display_name: 重组标识
        description: 是否存在债务重组情况的标记
        default_value: null
        constraints: null
      - name: regroupFlagSup
        data_type: string
        required: false
        display_name: 重组标识-监管调整后
        description: 监管口径下对重组标识的认定
        default_value: null
        constraints: null
      - name: commonProvisionAmt
        data_type: double
        required: false
        display_name: 准备金-人民币
        description: 表内计提的一般准备金金额，以人民币计
        default_value: null
        constraints: null
      - name: collateralAmtG1102
        data_type: double
        required: false
        display_name: G1102抵押品价值-人民币
        description: G1102标准下的抵押物评估价值，以人民币计
        default_value: null
        constraints: null
      - name: pledgeAmtG1102
        data_type: double
        required: false
        display_name: G1102质押品价值-人民币
        description: G1102标准下的质押物评估价值，以人民币计
        default_value: null
        constraints: null
      - name: effectRate
        data_type: double
        required: false
        display_name: 贷款执行利率
        description: 贷款实际执行的年化利率
        default_value: null
        constraints: null
      - name: pd
        data_type: double
        required: false
        display_name: 违约概率
        description: 预测该笔贷款在未来一段时间内的违约可能性
        default_value: null
        constraints: null
      - name: loanMaturity
        data_type: int
        required: false
        display_name: 贷款期限-月
        description: 贷款总期限，单位为月
        default_value: null
        constraints: null
      - name: fstputdt
        data_type: string
        required: false
        display_name: 贷款首次发放日期
        description: 贷款第一次发放的日期
        default_value: null
        constraints: null
      - name: loanPrin
        data_type: double
        required: false
        display_name: 贷款发放本金
        description: 贷款实际发放的本金金额
        default_value: null
        constraints: null
      - name: custCd
        data_type: string
        required: false
        display_name: 客户号
        description: 客户在系统中的唯一识别号码
        default_value: null
        constraints: null
      - name: orgCd
        data_type: string
        required: false
        display_name: 机构号
        description: 机构的唯一标识编号
        default_value: null
        constraints: null
      - name: prodCd
        data_type: string
        required: false
        display_name: 产品编号
        description: 贷款产品的唯一标识编号
        default_value: null
        constraints: null
      - name: agreeCd
        data_type: string
        required: false
        display_name: 合同号
        description: 签订的贷款合同编号
        default_value: null
        constraints: null
      - name: loanDirCd
        data_type: string
        required: false
        display_name: 投向行业代码
        description: 贷款资金用于哪个行业的代码
        default_value: null
        constraints: null
      - name: curCd
        data_type: string
        required: false
        display_name: 币种代码
        description: 币种代码
        default_value: null
        constraints: null
    data_source: null
    url: null
  - name: customer
    display_name: 客户
    description: 贷款客户信息
