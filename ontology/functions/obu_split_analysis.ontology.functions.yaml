ontology: obu_split_analysis.ontology
category: obu_split_analysis.ontology
functions:
- name: get_actual_sequence
  description: 获取ETC门架交易流水路径收费单元序列
  parameters:
  - name: passage
    type: Passage
  return_type: list<string>
  implementation_type: builtin
  published: false
  script_configured: true
- name: get_split_sequence
  description: 获取拆分路径收费单元序列
  parameters:
  - name: passage
    type: Passage
  return_type: list<string>
  implementation_type: builtin
  published: false
  script_configured: true
- name: get_actual_count
  description: 获取ETC门架交易流水路径收费单元个数
  parameters:
  - name: passage
    type: Passage
  return_type: integer
  implementation_type: builtin
  published: false
  script_configured: true
- name: get_split_count
  description: 获取拆分路径收费单元个数
  parameters:
  - name: passage
    type: Passage
  return_type: integer
  implementation_type: builtin
  published: false
  script_configured: true
- name: detect_duplicate_intervals
  description: 判断相邻门架收费单元是否重复
  parameters:
  - name: gantry_transactions
    type: list<GantryTransaction>
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: check_participating_gantry_continuity
  description: 判断参与拆分的门架交易序列是否连续
  parameters:
  - name: gantry_transactions
    type: list<GantryTransaction>
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: check_gantry_hex_continuity
  description: 判断所有门架交易序列是否连续
  parameters:
  - name: gantry_transactions
    type: list<GantryTransaction>
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: detect_late_upload
  description: 是否存在门架接收时间晚于拆分时间
  parameters:
  - name: gantry_transactions
    type: list<GantryTransaction>
  - name: split_time
    type: date
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: exists_upload_delay
  description: 是否存在门架上传延迟超过指定天数
  parameters:
  - name: gantry_transactions
    type: list<GantryTransaction>
  - name: threshold_days
    type: integer
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: check_route_consistency
  description: 拆分路径与门架路径是否一致
  parameters:
  - name: split_items
    type: list<SplitItem>
  - name: gantry_transactions
    type: list<GantryTransaction>
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
- name: check_fee_detail_consistency
  description: 逐收费单元金额是否一致
  parameters:
  - name: split_items
    type: list<SplitItem>
  - name: gantry_transactions
    type: list<GantryTransaction>
  return_type: boolean
  implementation_type: builtin
  published: false
  script_configured: true
