        required: true
        description: 收费单元ID（外键→TollUnit），从tollIntervalId组合中拆解
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: fee
        display_name: 计费金额
        data_type: long
        required: true
        description: 该收费单元的计费金额（单位：分），从feeGroup组合中拆解
        default_value: null
        constraints: null
        derived: false
        expr: null
    data_source: null
    url: ""

  - name: OnlineChargeRecord
    display_name: 在线计费记录
    description: 省中心在线服务计费记录，用于判断按最小费额路径计费等
    base_type: null
    properties:
      - name: record_id
        display_name: 在线计费记录唯一标识
