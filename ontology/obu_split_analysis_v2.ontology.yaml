link_types:
  - name: involves_vehicle
    display_name: 通行关联车辆
    description: 多趟通行属于同一辆车（vlp + vlpc → Vehicle）
    source_type: Passage
    target_type: Vehicle
    cardinality: many-to-one
    direction: directed
    properties: null
    property_mappings:
      vlp: vlp
      vlpc: vlpc
    transformation_mappings: null
    data_source: null
    url: null

  - name: entry_at
    display_name: 通行入口收费站
    description: 多趟通行可从同一收费站进入（enTollStationId → stationId）
    source_type: Passage
    target_type: TollStation
    cardinality: many-to-one
    direction: directed
    properties: null
    property_mappings:
      en_toll_station_id: station_id
    transformation_mappings: null
    data_source: null
    url: null

  - name: exit_at
    display_name: 通行出口收费站
    description: 多趟通行可从同一收费站离开（exTollStationId → stationId）
    source_type: Passage
    target_type: TollStation
    cardinality: many-to-one
    direction: directed
    properties: null
    property_mappings:
      ex_toll_station_id: station_id
    transformation_mappings: null
    data_source: null
    url: null

  - name: has_split_item
    display_name: 通行包含拆分明细
    description: 一次通行包含多个拆分明细项（passage_id）
    source_type: Passage
    target_type: SplitItem
    cardinality: one-to-many
    direction: directed
    properties: null
    property_mappings:
      passage_id: passage_id
    transformation_mappings: null
    data_source: null
    url: null

  - name: has_gantry_transaction
    display_name: 通行包含门架交易
    description: 一次通行包含多个门架交易流水（passId）
    source_type: Passage
    target_type: GantryTransaction
    cardinality: one-to-many
    direction: directed
    properties: null
    property_mappings:
      pass_id: pass_id
    transformation_mappings: null
    data_source: null
    url: null

