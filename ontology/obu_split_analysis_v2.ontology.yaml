        expr: null
      - name: pass_id
        display_name: 通行标识ID
        data_type: string
        required: true
        description: 通行标识ID（外键→Passage）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: calculate_result
        display_name: 计费结果
        data_type: integer
        required: false
