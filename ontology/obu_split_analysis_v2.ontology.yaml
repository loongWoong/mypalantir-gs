  - name: check_participating_gantry_continuity
    display_name: 判断参与拆分的门架交易序列是否连续
    description: 筛选inSplitFlag==1的门架交易，按transTime排序后检查lastGantryHex是否等于前一个的gantryHex
    input:
      - name: gantry_transactions
        type: list<GantryTransaction>
        description: 门架交易列表
