        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: res_des
        display_name: 计费结果描述
        data_type: string
        required: false
        description: 包含计费详情，如"按最小费额返回"
        default_value: null
        constraints: null
        derived: false
        expr: null
    data_source: null
    url: ""

  - name: TollUnit
