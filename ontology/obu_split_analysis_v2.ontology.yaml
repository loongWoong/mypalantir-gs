version: 2.0.0
namespace: com.tollcenter.ontology.obu_split_analysis.v2
description: 高速公路拆分异常分析本体模型 V2 - 基于规则模型设计文档V1.7及业务表结构
data_sources: null
object_types:
  - name: Passage
    display_name: 通行记录
    description: 高速公路通行记录，包含单省交易和跨省交易的拆分结果信息
    base_type: null
    properties:
      - name: passage_id
        display_name: 通行唯一标识
        data_type: string
        required: true
        description: 通行唯一标识（交易编码）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: pass_id
        display_name: 通行标识ID
        data_type: string
        required: true
        description: 通行标识ID，关联门架交易流水
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: vlp
        display_name: 车牌号
        data_type: string
        required: true
        description: 关联车辆的车牌号（外键→Vehicle）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: vlpc
        display_name: 车牌颜色
        data_type: integer
        required: true
        description: 关联车辆的车牌颜色（外键→Vehicle）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: en_toll_station_id
        display_name: 入口收费站ID
        data_type: string
        required: false
        description: 入口收费站ID（外键→TollStation）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: ex_toll_station_id
        display_name: 出口收费站ID
        data_type: string
        required: true
        description: 出口收费站ID（外键→TollStation）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: exit_fee_type
        display_name: 计费方式
        data_type: integer
        required: false
        description: 1-OBU内累计优惠后 2-OBU内累计优惠前(废弃) 3-CPC卡内累计 4-省中心在线 5-部中心在线 6-全网最小费额 11-开放式
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: ex_time
        display_name: 出口时间
        data_type: date
        required: false
        description: 车辆驶出收费站的时间
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: split_base
        display_name: 拆分依据
        data_type: integer
        required: false
        description: 5-分省信息(附属表)/按最小费额拆分
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: split_time
        display_name: 拆分时间
        data_type: date
        required: false
        description: 省中心拆分处理时间
        default_value: null
        constraints: null
        derived: false
        expr: null
      # 基础统计衍生属性
      - name: split_detail_count
        display_name: 拆分明细数量
        data_type: integer
        required: false
        description: 当前通行关联的拆分明细条数
        default_value: null
        constraints: null
        derived: true
        expr: "size(links.has_split_item)"
      - name: gantry_transaction_count
        display_name: 门架交易数量
        data_type: integer
        required: false
        description: 当前通行关联的门架交易流水条数
        default_value: null
        constraints: null
        derived: true
        expr: "size(links.has_gantry_transaction)"
      - name: split_fee_total
        display_name: 拆分费用合计
        data_type: long
        required: false
        description: 所有拆分明细项的金额合计（单位：分）
        default_value: null
        constraints: null
        derived: true
        expr: "calc_split_fee_total(links.has_split_item)"
      - name: gantry_fee_total
        display_name: 门架费用合计
        data_type: long
        required: false
        description: 所有门架交易计费项的金额合计（单位：分）
        default_value: null
        constraints: null
        derived: true
        expr: "calc_gantry_fee_total(links.has_gantry_transaction)"
      # 诊断衍生属性 - 路径一致性
      - name: count_equal
        display_name: 收费单元个数是否一致
        data_type: boolean
        required: false
        description: 拆分路径与ETC门架交易流水路径的收费单元个数是否相等
        default_value: null
        constraints: null
        derived: true
        expr: "get_split_count(this) == get_actual_count(this)"
      - name: sequence_equal
        display_name: 收费单元序列是否一致
        data_type: boolean
        required: false
        description: 拆分序列与实际门架交易流水序列是否完全一致
        default_value: null
        constraints: null
        derived: true
        expr: "get_split_sequence(this) == get_actual_sequence(this)"
      - name: has_duplicate_unit
        display_name: 是否存在收费单元重复
        data_type: boolean
        required: false
        description: ETC门架交易流水路径中，相邻门架是否存在同一收费单元重复出现
        default_value: null
        constraints: null
        derived: true
        expr: "has_adjacent_duplicate_toll_unit(links.has_gantry_transaction)"
      - name: participating_gantry_continuous
        display_name: 参与拆分门架是否连续
        data_type: boolean
        required: false
        description: 参与拆分的门架交易序列是否连续（lastGantryHex与前一门架gantryHex是否衔接）
        default_value: null
        constraints: null
        derived: true
        expr: "check_participating_gantry_continuity(links.has_gantry_transaction)"
      - name: all_gantry_continuous
        display_name: 所有门架是否连续
        data_type: boolean
        required: false
        description: 所有门架交易序列是否连续，用于检测数据上传完整性
        default_value: null
        constraints: null
        derived: true
        expr: "check_gantry_hex_continuity(links.has_gantry_transaction)"
      - name: has_delayed_receive
        display_name: 是否存在晚于拆分时间的门架交易
        data_type: boolean
        required: false
        description: 是否存在门架交易接收时间晚于拆分时间
        default_value: null
        constraints: null
        derived: true
        expr: "detect_late_upload(links.has_gantry_transaction, split_time)"
      - name: has_upload_delay
        display_name: 是否存在门架延迟上传
        data_type: boolean
        required: false
        description: 是否存在门架交易上传延迟超过3天
        default_value: null
        constraints: null
        derived: true
        expr: "exists_upload_delay(links.has_gantry_transaction, 3)"
      # 诊断衍生属性 - 时间异常（V1.3+）
      - name: has_time_jump_forward
        display_name: 门架交易时间间隔过短
        data_type: boolean
        required: false
        description: 物理路径连续的门架之间是否存在时间间隔过短（跳时）
        default_value: null
        constraints: null
        derived: true
        expr: "has_time_jump_forward(links.has_gantry_transaction, 1)"
      - name: has_time_jump_backward
        display_name: 门架交易时间倒流
        data_type: boolean
        required: false
        description: 物理路径连续的门架之间是否存在时间倒流
        default_value: null
        constraints: null
        derived: true
        expr: "has_time_jump_backward(links.has_gantry_transaction)"
      - name: has_receive_after_exit
        display_name: 门架接收晚于出口时间
        data_type: boolean
        required: false
        description: 是否存在门架交易接收时间晚于出口时间
        default_value: null
        constraints: null
        derived: true
        expr: "exists_receive_after_exit(links.has_gantry_transaction, ex_time)"
      # 诊断衍生属性 - 最小费额（V1.5/V1.6）
      - name: is_min_fee_path
        display_name: 是否按最小费额路径计费
        data_type: boolean
        required: false
        description: 本次通行是否按最小费额路径计费（基于在线计费记录）
        default_value: null
        constraints: null
        derived: true
        expr: "check_min_fee_path(this)"
      - name: is_min_fee_split
        display_name: 是否按最小费额拆分
        data_type: boolean
        required: false
        description: 是否按最小费额拆分（splitBase=5）
        default_value: null
        constraints: null
        derived: true
        expr: "split_base == 5"
      # 诊断衍生属性 - 门架有效性（V1.7）
      - name: has_invalid_gantry
        display_name: 是否存在无效门架交易
        data_type: boolean
        required: false
        description: 是否存在无效的门架交易流水（mediatype/traderesult/feecalcresult/validstatus/tac综合判定）
        default_value: null
        constraints: null
        derived: true
        expr: "check_has_invalid_gantry(this)"
    data_source: null
    url: ""

  - name: SplitItem
    display_name: 拆分明细项
    description: 一次通行的拆分结果明细，每条记录对应一个收费单元的拆分金额
    base_type: null
    properties:
      - name: passage_id
        display_name: 所属通行ID
        data_type: string
        required: true
        description: 所属通行记录的ID（外键→Passage）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: position
        display_name: 序列位置
        data_type: integer
        required: true
        description: 在拆分明细序列中的顺序（由清分结算系统提供，从1开始）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: toll_interval_id
        display_name: 收费单元ID
        data_type: string
        required: true
        description: 收费单元ID（外键→TollUnit），从splitOwnerGroup组合中拆解
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: fee
        display_name: 拆分金额
        data_type: long
        required: true
        description: 该收费单元的拆分金额（单位：分），从splitOwnerfeeGroup组合中拆解
        default_value: null
        constraints: null
        derived: false
        expr: null
    data_source: null
    url: ""

  - name: GantryTransaction
    display_name: 门架交易流水
    description: ETC门架计费扣费交易数据，记录车辆通过每个门架时的交易信息
    base_type: null
    properties:
      - name: transaction_id
        display_name: 门架交易唯一标识
        data_type: string
        required: true
        description: 门架交易唯一标识（tradeId）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: pass_id
        display_name: 通行标识ID
        data_type: string
        required: true
        description: 通行标识ID（外键→Passage）
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: gantry_id
        display_name: 门架ID
        data_type: string
        required: true
        description: ETC门架编号
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: trans_time
        display_name: 门架交易时间
        data_type: date
        required: false
        description: 车辆通过门架的交易时间
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: receive_time
        display_name: 省中心接收时间
        data_type: date
        required: false
        description: 省中心接收该门架交易数据的时间
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: gantry_hex
        display_name: 当前门架HEX编码
        data_type: string
        required: true
        description: 当前门架gantryHex编码
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: last_gantry_hex
        display_name: 上一门架HEX编码
        data_type: string
        required: false
        description: 上一通行门架gantryHex编码，用于判断路径连续性
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: in_split_flag
        display_name: 是否参与拆分
        data_type: integer
        required: false
        description: 是否参与拆分标记（0-未参与拆分 1-参与拆分），来源于tbl_GantryETCWaste
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: toll_interval_id
        display_name: 收费单元编号组合
        data_type: string
        required: false
        description: 门架交易对应的收费单元编号组合（用|分隔），来源于tbl_GantryWaste.tollIntervalId
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: fee_group
        display_name: 交易金额组合
        data_type: string
        required: false
        description: 门架交易对应的交易金额组合（用|分隔），来源于tbl_GantryWaste.feeGroup
        default_value: null
        constraints: null
        derived: false
        expr: null
      # 门架有效性判定相关属性（V1.7）
      - name: mediatype
        display_name: 通行介质类型
        data_type: integer
        required: false
        description: 1-OBU 2-CPC
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: traderesult
        display_name: 交易结果
        data_type: integer
        required: false
        description: 0-交易成功 1-交易失败
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: feecalcresult
        display_name: 计费模块响应计费结果
        data_type: integer
        required: false
        description: 0-正常
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: validstatus
        display_name: 去重状态
        data_type: integer
        required: false
        description: 0或1
        default_value: null
        constraints: null
        derived: false
        expr: null
      - name: tac
        display_name: TAC码
        data_type: string
        required: false
        description: TAC码，长度8
        default_value: null
        constraints: null
        derived: false
        expr: null
    data_source: null
    url: ""

  - name: GantryTollItem
    display_name: 门架交易收费单元计费项
    description: 门架交易中每个收费单元的计费明细，一个门架交易可能对应多个收费单元
    base_type: null
